name: CI/CD Build & Deploy

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build_and_push:
    name: Build and Push Docker images
    runs-on: ubuntu-latest
    outputs:
      backend_image: ${{ steps.set_outputs.outputs.backend_image }}
      frontend_image: ${{ steps.set_outputs.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./warehouse-backend
          file: ./warehouse-backend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/nexus-backend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/nexus-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./nexusvc-main
          file: ./nexusvc-main/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_MAPTILER_KEY=${{ secrets.VITE_MAPTILER_KEY }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/nexus-frontend:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/nexus-frontend:latest

      - name: Set outputs
        id: set_outputs
        run: |
          echo "backend_image=ghcr.io/${{ github.repository_owner }}/nexus-backend:${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "frontend_image=ghcr.io/${{ github.repository_owner }}/nexus-frontend:${{ github.sha }}" >> $GITHUB_OUTPUT

  deploy_render:
    name: Deploy to Render (optional)
    needs: build_and_push
    runs-on: ubuntu-latest
    if: ${{ secrets.RENDER_API_KEY != '' }}
    steps:
      - name: Trigger Render deploy(s) via API
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_FRONTEND_SERVICE_ID: ${{ secrets.RENDER_FRONTEND_SERVICE_ID }}
          RENDER_BACKEND_SERVICE_ID: ${{ secrets.RENDER_BACKEND_SERVICE_ID }}
        run: |
          set -e
          trigger() {
            local svc=$1
            if [ -n "$svc" ]; then
              echo "Triggering Render deploy for service $svc"
              curl -sS -X POST "https://api.render.com/v1/services/$svc/deploys" \
                -H "Authorization: Bearer $RENDER_API_KEY" \
                -H "Content-Type: application/json" \
                -d '{"clearCache":true}'
              echo
            else
              echo "No service id provided, skipping"
            fi
          }

          trigger "$RENDER_FRONTEND_SERVICE_ID"
          trigger "$RENDER_BACKEND_SERVICE_ID"

  deploy_vps:
    name: Deploy to VPS via SSH (optional)
    needs: build_and_push
    runs-on: ubuntu-latest
    if: ${{ secrets.SSH_PRIVATE_KEY != '' && secrets.VPS_HOST != '' && secrets.VPS_USER != '' && secrets.REMOTE_COMPOSE_DIR != '' }}
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e
            echo "Entering deploy dir: ${{ secrets.REMOTE_COMPOSE_DIR }}"
            cd ${{ secrets.REMOTE_COMPOSE_DIR }}
            # Pull latest images (if your compose file references images) and restart
            docker compose pull || true
            docker compose up -d --build
